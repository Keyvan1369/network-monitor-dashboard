services:

  postgres:

    image: postgres:17

    container_name: network-monitor-postgres

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: network_monitor

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data



  server:

    build: ./server

    container_name: network-monitor-server

    restart: always

    ports:

      - "3000:3000"

    volumes:

      - ./server:/app

      - /app/node_modules

    environment:

      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/network_monitor?schema=public

    depends_on:

      - postgres

    command: npm run dev



  client:

    build: ./client

    container_name: network-monitor-client

    restart: always

    ports:

      - "5173:5173"

    volumes:

      - ./client:/app

      - /app/node_modules

    depends_on:

      - server

    command: npm run dev -- --host



volumes:

  postgres_data: